version: 2

project_name: radiogogo

before:
  hooks:
    # Read-only by design: GoReleaser validates git state before these run, so
    # a hook that mutated go.mod would go undetected and the release would not
    # match the tagged commit.
    - go mod verify

builds:
  - id: radiogogo
    main: ./cmd/radiogogo
    binary: radiogogo
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{ .Version }}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    mod_timestamp: "{{ .CommitTimestamp }}"

archives:
  - id: default
    ids:
      - radiogogo
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - README.md
      - LICENSE

checksum:
  name_template: checksums.txt
  algorithm: sha256

sboms:
  - id: archives
    artifacts: archive

signs:
  - id: checksums
    cmd: cosign
    signature: "${artifact}.sig"
    certificate: "${artifact}.pem"
    args:
      - sign-blob
      - "--output-signature=${signature}"
      - "--output-certificate=${certificate}"
      - "${artifact}"
      - "--yes"
    artifacts: checksum
    output: true

snapshot:
  version_template: "{{ incpatch .Version }}-snapshot"

changelog:
  sort: asc
  use: github
  groups:
    - title: Features
      regexp: '^.*?feat(\(.+\))??!?:.+$'
      order: 0
    - title: Bug fixes
      regexp: '^.*?fix(\(.+\))??!?:.+$'
      order: 1
    - title: Build and CI
      regexp: '^.*?(build|ci)(\(.+\))??!?:.+$'
      order: 2
    - title: Other
      order: 999
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "Merge pull request"

release:
  draft: false
  prerelease: auto
  footer: |
    ## Verifying this release

    Checksums are signed with [cosign](https://docs.sigstore.dev/) keylessly —
    there is no private key. Download `checksums.txt`, `checksums.txt.sig`, and
    `checksums.txt.pem`, then:

    ```sh
    cosign verify-blob \
      --certificate checksums.txt.pem \
      --signature checksums.txt.sig \
      --certificate-identity-regexp 'https://github\.com/omaciel/radiogogo/\.github/workflows/.+' \
      --certificate-oidc-issuer https://token.actions.githubusercontent.com \
      checksums.txt
    ```

    Then check your archive against it:

    ```sh
    sha256sum --check --ignore-missing checksums.txt
    ```
