version: "2"

linters:
  default: standard
  enable:
    - bodyclose
    - errorlint
    - gosec
    - misspell
    - revive
    - unconvert
  exclusions:
    presets:
      # Covers the long-standing errcheck carve-out for writes to stdout/stderr
      # and for Flush/Close. A CLI printing to stdout has nothing useful to do
      # with those errors, and checking each one buries the real handling.
      - std-error-handling
    rules:
      # Test fixtures deliberately construct odd URLs and ignore write errors.
      - path: _test\.go
        linters:
          - errcheck
          - gosec
      # std-error-handling only silences errcheck's own stdout/Flush pattern
      # (EXC0001); gosec's G104 is a separate, overlapping check that the same
      # preset does not cover (upstream carries that exclusion only in the
      # "legacy" preset, which also covers unrelated linters we do not want to
      # blanket-disable). Scope the G104 carve-out to the one file that
      # deliberately ignores stdout write/Flush errors.
      - path: cmd/radiogogo/main\.go
        text: "G104"
        linters:
          - gosec

formatters:
  enable:
    - gofmt
    - goimports
