version: "2"

linters:
  default: standard
  enable:
    - bodyclose
    - errorlint
    - gosec
    - misspell
    - revive
    - unconvert
  exclusions:
    presets:
      # Covers the long-standing errcheck carve-out for writes to stdout/stderr
      # and for Flush/Close. A CLI printing to stdout has nothing useful to do
      # with those errors, and checking each one buries the real handling.
      - std-error-handling
    rules:
      # Test fixtures deliberately construct odd URLs and ignore write errors.
      - path: _test\.go
        linters:
          - errcheck
          - gosec
      # gosec's G104 overlaps errcheck's unhandled-error check, but the
      # std-error-handling preset only silences errcheck's. printStations
      # deliberately ignores the Flush error: it writes the station table to
      # stdout, where there is nothing useful to do about a write failure.
      # Scoped to that one call so any other unhandled error here still fails.
      - path: cmd/radiogogo/main\.go
        source: 'tw\.Flush\(\)'
        text: "G104"
        linters:
          - gosec

formatters:
  enable:
    - gofmt
    - goimports
